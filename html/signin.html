<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>შესვლა — EverREST</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/signin.css"/>
  <link rel="stylesheet" href="../css/theme.css"/>
  <script src="../js/theme.js"></script>
</head>
<body>
  <button class="theme-toggle-float" title="Switch theme">☀️</button>
  <div class="auth-bg">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M53.5 245.1L110.3 131.4C121.2 109.7 143.3 96 167.6 96L472.5 96C496.7 96 518.9 109.7 529.7 131.4L586.5 245.1C590.1 252.3 592 260.2 592 268.3C592 295.6 570.8 318 544 319.9L544 512C544 529.7 529.7 544 512 544C494.3 544 480 529.7 480 512L480 320L384 320L384 496C384 522.5 362.5 544 336 544L144 544C117.5 544 96 522.5 96 496L96 319.9C69.2 318 48 295.6 48 268.3C48 260.3 49.9 252.3 53.5 245.1zM160 320L160 432C160 440.8 167.2 448 176 448L304 448C312.8 448 320 440.8 320 432L320 320L160 320z"/></svg></div>
        <div class="logo-text">EverREST</div>
      </div>
      <h1>კეთილი იყოს<br/>მობრძანება</h1>
      <p class="subtitle">შედით თქვენს ანგარიშზე</p>
      <div class="field">
        <label>ელ-ფოსტა</label>
        <input type="email" id="email" placeholder="john@doe.com"/>
      </div>
      <div class="field" style="margin-top:14px;">
        <label>პაროლი</label>
        <div class="pass-wrap">
          <input type="password" id="password" placeholder="••••••••"/>
          <button class="pass-toggle" id="toggle-password">👁</button>
        </div>
      </div>
      <div id="alert"></div>
      <button class="btn-primary" id="signin-btn">შესვლა</button>
      <p class="switch-link">არ გაქვს ანგარიში? <a href="../index.html">რეგისტრაცია</a></p>
    </div>
  </div>
  <script src="../js/signin.js"></script>
</body>
</html>
