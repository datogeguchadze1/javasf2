<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>მაღაზია — EverREST</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/shop.css"/>
  <link rel="stylesheet" href="../css/theme.css"/>
  <script src="../js/theme.js"></script>
</head>
<body>

  <header class="shop-header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M53.5 245.1L110.3 131.4C121.2 109.7 143.3 96 167.6 96L472.5 96C496.7 96 518.9 109.7 529.7 131.4L586.5 245.1C590.1 252.3 592 260.2 592 268.3C592 295.6 570.8 318 544 319.9L544 512C544 529.7 529.7 544 512 544C494.3 544 480 529.7 480 512L480 320L384 320L384 496C384 522.5 362.5 544 336 544L144 544C117.5 544 96 522.5 96 496L96 319.9C69.2 318 48 295.6 48 268.3C48 260.3 49.9 252.3 53.5 245.1zM160 320L160 432C160 440.8 167.2 448 176 448L304 448C312.8 448 320 440.8 320 432L320 320L160 320z"/></svg></div>
        <div class="logo-text">EverREST Shop</div>
      </div>
      <nav class="header-nav">
        <button class="nav-btn active">🛍 მაღაზია</button>
        <button class="nav-btn" id="btn-profile">👤 პროფილი</button>
      </nav>
      <div class="header-right">
        <button class="theme-toggle" title="Switch theme">☀️</button>
        <button class="cart-btn" id="btn-cart">🛒 <span id="cart-count">0</span></button>
        <button class="btn-signout desktop-only" id="btn-signout">გასვლა</button>
        <button class="burger-btn" id="burger-btn" aria-label="მენიუ">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div class="mobile-nav" id="mobile-nav">
      <button class="nav-btn active" id="m-btn-shop">🛍 მაღაზია</button>
      <button class="nav-btn" id="m-btn-profile">👤 პროფილი</button>
      <button class="nav-btn mobile-cart-btn" id="m-btn-cart">🛒 კალათა <span class="m-cart-badge" id="m-cart-count">0</span></button>
      <button class="nav-btn nav-btn-signout" id="m-btn-signout">🚪 გასვლა</button>
    </div>
  </header>

  <div class="filter-bar">
    <div class="filter-inner">
      <div class="filter-group">
        <label>🔍 ძიება</label>
        <input type="text" id="f-search" placeholder="სახელი..."/>
      </div>
      <div class="filter-group">
        <label>📦 კატეგორია</label>
        <select id="f-category">
          <option value="">ყველა</option>
        </select>
      </div>
      <div class="filter-group">
        <label>💰 ფასი მინ</label>
        <input type="number" id="f-price-min" placeholder="0" min="0"/>
      </div>
      <div class="filter-group">
        <label>💰 ფასი მაქს</label>
        <input type="number" id="f-price-max" placeholder="9999" min="0"/>
      </div>
      <div class="filter-group">
        <label>↕️ სორტირება</label>
        <select id="f-sort">
          <option value="">ნაგულისხმევი</option>
          <option value="price_asc">ფასი ↑</option>
          <option value="price_desc">ფასი ↓</option>
          <option value="title_asc">სახელი A–Z</option>
          <option value="title_desc">სახელი Z–A</option>
        </select>
      </div>
      <button class="btn-reset" id="btn-reset">✕ გასუფთავება</button>
    </div>
  </div>

  <main class="products-main">
    <div id="products-status" class="products-status"></div>
    <div id="products-grid"  class="products-grid"></div>
    <div id="pagination"     class="pagination"></div>
  </main>

  <div id="cart-overlay" class="cart-overlay"></div>
  <div id="cart-drawer" class="cart-drawer">
    <div class="cart-header">
      <h2>🛒 კალათა</h2>
      <button class="cart-close" id="btn-cart-close">✕</button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div id="cart-footer" class="cart-footer" style="display:none;">
      <div class="cart-total">სულ: <strong id="cart-total">$0.00</strong></div>
      <button class="btn-primary" id="btn-checkout">✅ შეკვეთის განხორციელება</button>
    </div>
  </div>

  <script src="../js/shop.js"></script>
</body>
</html>
