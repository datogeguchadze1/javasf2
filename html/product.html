<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>პროდუქტი — EverREST</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/shop.css"/>
  <link rel="stylesheet" href="../css/product.css"/>
  <link rel="stylesheet" href="../css/theme.css"/>
  <script src="../js/theme.js"></script>
</head>
<body>

  <header class="shop-header">
    <div class="header-inner">
      <div class="logo" id="btn-logo" style="cursor:pointer">
        <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M53.5 245.1L110.3 131.4C121.2 109.7 143.3 96 167.6 96L472.5 96C496.7 96 518.9 109.7 529.7 131.4L586.5 245.1C590.1 252.3 592 260.2 592 268.3C592 295.6 570.8 318 544 319.9L544 512C544 529.7 529.7 544 512 544C494.3 544 480 529.7 480 512L480 320L384 320L384 496C384 522.5 362.5 544 336 544L144 544C117.5 544 96 522.5 96 496L96 319.9C69.2 318 48 295.6 48 268.3C48 260.3 49.9 252.3 53.5 245.1zM160 320L160 432C160 440.8 167.2 448 176 448L304 448C312.8 448 320 440.8 320 432L320 320L160 320z"/></svg></div>
        <div class="logo-text">EverREST Shop</div>
      </div>
      <nav class="header-nav">
        <button class="nav-btn" id="btn-shop">🛍 მაღაზია</button>
        <button class="nav-btn" id="btn-profile">👤 პროფილი</button>
      </nav>
      <div class="header-right">
        <button class="theme-toggle" title="Switch theme">☀️</button>
        <button class="cart-btn desktop-cart" id="btn-cart">🛒 <span id="cart-count">0</span></button>
        <button class="btn-signout desktop-only" id="btn-signout">გასვლა</button>
        <button class="burger-btn" id="burger-btn" aria-label="მენიუ">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div class="mobile-nav" id="mobile-nav">
      <button class="nav-btn" id="m-btn-shop">🛍 მაღაზია</button>
      <button class="nav-btn" id="m-btn-profile">👤 პროფილი</button>
      <button class="nav-btn mobile-cart-btn" id="m-btn-cart">🛒 კალათა <span class="m-cart-badge" id="m-cart-count">0</span></button>
      <button class="nav-btn nav-btn-signout" id="m-btn-signout">🚪 გასვლა</button>
    </div>
  </header>

  <div class="product-page">
    <button class="btn-back" id="btn-back">← მაღაზიაში დაბრუნება</button>

    <div id="product-content" class="product-detail">
      <div class="product-detail-left">
        <img id="d-image" src="" alt="პროდუქტი"
             onerror="this.src='https://placehold.co/600x500/1e1e2a/6b6b80?text=No+Image'"/>
      </div>
      <div class="product-detail-right">
        <div id="d-category" class="product-category"></div>
        <h1 id="d-title"></h1>
        <div id="d-price" class="detail-price"></div>
        <div id="d-stock" class="amount-badge"></div>
        <p id="d-description" class="detail-description"></p>
        <div id="d-alert"></div>
        <button id="d-btn" class="btn-primary">+ კალათაში დამატება</button>
      </div>
    </div>
  </div>

  <!-- ── RATINGS ── -->
  <div class="product-page reviews-page">
    <div class="reviews-wrap">

      <div class="rate-card">
        <h2 class="rate-title">⭐ შეაფასე პროდუქტი</h2>
        <p class="rate-sub">აირჩიე ვარსკვლავების რაოდენობა</p>
        <div class="star-picker" id="star-picker">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>
        <div id="rate-alert"></div>
        <button class="btn-primary btn-rate-submit" id="btn-submit-rate">შეფასების გაგზავნა</button>
      </div>

      <div class="rating-display-wrap">
        <h2 class="rate-title">📊 პროდუქტის რეიტინგი</h2>
        <div id="rating-display">
          <div class="rating-skeleton-wrap">
            <div class="skeleton" style="width:80px;height:80px;border-radius:16px"></div>
            <div style="display:flex;flex-direction:column;gap:8px;flex:1">
              <div class="skeleton skeleton-line" style="width:50%"></div>
              <div class="skeleton skeleton-line" style="width:35%"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="cart-overlay" class="cart-overlay"></div>
  <div id="cart-drawer" class="cart-drawer">
    <div class="cart-header">
      <h2>🛒 კალათა</h2>
      <button class="cart-close" id="btn-cart-close">✕</button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div id="cart-footer" class="cart-footer" style="display:none;">
      <div class="cart-total">სულ: <strong id="cart-total">$0.00</strong></div>
      <button class="btn-primary" id="btn-checkout">✅ შეკვეთის განხორციელება</button>
    </div>
  </div>

  <script src="../js/product.js"></script>
</body>
</html>
